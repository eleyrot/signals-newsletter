<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signals — Impressum</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07080d;
      color: #e4e0d8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      padding: 64px 48px;
      border-top: 3px solid #c9a55a;
      border-bottom: 3px solid #c9a55a;
    }
    .logo {
      font-size: 28px;
      font-style: italic;
      color: #e4e0d8;
      letter-spacing: -.01em;
      margin-bottom: 32px;
    }
    h1 {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      font-weight: normal;
      color: #c9a55a;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .block { margin-bottom: 28px; }
    .label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #5a5648;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    p {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #b0a898;
      line-height: 1.8;
    }
    a { color: #c9a55a; text-decoration: none; }
    a:hover { color: #e4e0d8; }
    .back {
      display: inline-block;
      margin-top: 40px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #5a5648;
      text-decoration: none;
      letter-spacing: .08em;
    }
    .back:hover { color: #c9a55a; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Signals</p>
    <h1>Impressum</h1>

    <div class="block">
      <p class="label">Betreiber</p>
      <p>Silvan Inauen</p>
    </div>

    <div class="block">
      <p class="label">Kontakt</p>
      <p><a href="mailto:silvan.inauenn@gmail.com">silvan.inauenn@gmail.com</a></p>
    </div>

    <div class="block">
      <p class="label">Inhalt</p>
      <p>Signals ist ein kostenloser Newsletter zu den Themen KI, Technologie und Finanzen. Die Inhalte werden automatisch aus öffentlichen Quellen zusammengefasst und auf Deutsch aufbereitet.</p>
    </div>

    <a class="back" href="index.html">← Zurück zur Startseite</a>
  </div>
</body>
</html>
