<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signals — Anmeldung bestätigt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #07080d;
      color: #e4e0d8;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      text-align: center;
      padding: 64px 48px;
      border-top: 3px solid #c9a55a;
      border-bottom: 3px solid #c9a55a;
    }
    .logo {
      font-size: 36px;
      font-style: italic;
      color: #e4e0d8;
      letter-spacing: -.01em;
      margin-bottom: 8px;
    }
    .tagline {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      color: #3a3830;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .icon {
      font-size: 40px;
      margin-bottom: 24px;
      color: #c9a55a;
    }
    h1 {
      font-size: 26px;
      font-weight: normal;
      color: #e4e0d8;
      line-height: 1.35;
      margin-bottom: 16px;
    }
    p {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      color: #7a7468;
      line-height: 1.8;
    }
    .back {
      display: inline-block;
      margin-top: 40px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #c9a55a;
      text-decoration: none;
      letter-spacing: .08em;
    }
    .back:hover { color: #e4e0d8; }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Signals</p>
    <p class="tagline">KI · Tech · Finanzen</p>
    <div class="icon">✓</div>
    <h1>Anmeldung bestätigt.</h1>
    <p>Du bist dabei. Die erste Ausgabe von Signals landet<br>am nächsten Samstag in deinem Postfach.</p>
    <a class="back" href="index.html">← Zurück zur Startseite</a>
  </div>
</body>
</html>
